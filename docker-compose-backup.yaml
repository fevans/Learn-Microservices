services:
  identity.service:
    image: identity.service
    container_name: identity-service
    build:
      context: src
      dockerfile: Identity.Service/Dockerfile
    ports:
      - "5005:8080"
    environment:
      - MongoDbSettings__Host=mongodb
      - MongoDbSettings__DatabaseName=IdentityDb
      - AllowedOrigins=http://localhost:3000
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - catalog-network
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_started

  catalog.service:
    image: catalog.service
    container_name: catalog-service
    build:
      context: src
      dockerfile: Catalog.Service/Dockerfile
    ports:
      - "5001:8080"
    environment:
      - MongoDbSettings__Host=mongodb
      - RabbitMqSettings__Host=rabbitmq
      - AllowedOrigins=http://localhost:3000
      - ServiceSettings__Authority=http://identity.service:8080
    networks:
      - catalog-network
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      identity.service:
        condition: service_started
  
  inventory.service:
    image: inventory.service
    container_name: inventory-service
    build:
      context: src
      dockerfile: Inventory.Service/Dockerfile
    ports:
      - "5002:8080"
    environment:
      - MongoDbSettings__Host=mongodb
      - RabbitMqSettings__Host=rabbitmq
      - AllowedOrigins=http://localhost:3000
      - ServiceSettings__Authority=http://identity.service:8080
    networks:
      - catalog-network
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      identity.service:
        condition: service_started

  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - catalog-network
    restart: unless-stopped
  
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"    # AMQP protocol port
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    networks:
      - catalog-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  catalog-network:
    driver: bridge

volumes:
  mongodb-data:
  rabbitmqdata:

